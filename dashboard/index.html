<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard VideoTabu</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Mobile Top Bar -->
    <div class="mobile-topbar">
        <button id="menuToggle" class="menu-toggle">☰</button>
        <h2>🎬 VideoTabu</h2>
        <span class="admin-badge">Admin</span>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎬 VideoTabu</h2>
                <span class="admin-badge">Admin</span>
                <button id="closeSidebar" class="close-sidebar">✕</button>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <span>📊</span> Dashboard
                </button>
                <button class="nav-item" data-view="posts">
                    <span>📝</span> Posts
                </button>
                <button class="nav-item" data-view="create">
                    <span>➕</span> Create Post
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <section id="viewDashboard" class="view active">
                <div class="view-header">
                    <h1>Dashboard</h1>
                    <div class="stats-grid" id="statsGrid">
                        <div class="stat-card">
                            <span class="stat-icon">📝</span>
                            <div>
                                <div class="stat-number" id="totalPosts">-</div>
                                <div class="stat-label">Total Posts</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon">✅</span>
                            <div>
                                <div class="stat-number" id="publishedPosts">-</div>
                                <div class="stat-label">Published</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon">📄</span>
                            <div>
                                <div class="stat-number" id="draftPosts">-</div>
                                <div class="stat-label">Draft</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon">👁️</span>
                            <div>
                                <div class="stat-number" id="totalViews">-</div>
                                <div class="stat-label">Total Views</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Recent Posts Preview -->
                <div class="recent-posts">
                    <h2>Recent Posts</h2>
                    <div id="recentPostsList" class="posts-list"></div>
                </div>
            </section>

            <!-- Posts View -->
            <section id="viewPosts" class="view hidden">
                <div class="view-header">
                    <h1>Manage Posts</h1>
                    <button class="btn-primary" onclick="showCreatePost()">➕ New</button>
                </div>
                
                <div class="posts-controls">
                    <select id="filterStatus" onchange="loadPosts()">
                        <option value="all">All Status</option>
                        <option value="published">Published</option>
                        <option value="draft">Draft</option>
                    </select>
                    <input type="text" id="searchPosts" placeholder="Search posts..." onkeyup="loadPosts()">
                </div>

                <div id="postsList" class="posts-list">
                    <div class="loading">Loading...</div>
                </div>
            </section>

            <!-- Create Post View -->
            <section id="viewCreate" class="view hidden">
                <div class="view-header">
                    <h1>Create New Post</h1>
                </div>

                <form id="createPostForm" class="create-form">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="postTitle" required placeholder="Masukkan judul post">
                    </div>

                    <div class="form-group">
                        <label>Genre</label>
                        <input type="text" id="postGenre" placeholder="Contoh: Travel, Food, Photography">
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select id="postStatus">
                            <option value="draft">Draft</option>
                            <option value="published">Published</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Cover URL</label>
                        <input type="url" id="postCover" placeholder="URL cover/thumbnail">
                        <small>Kosongkan untuk auto-generate dari media pertama</small>
                    </div>

                    <div class="form-group">
                        <label>Content (Media)</label>
                        <div id="mediaContainer">
                            <div class="media-item-form">
                                <div class="media-row">
                                    <select class="media-type-select">
                                        <option value="img">🖼️ Gambar</option>
                                        <option value="vid">🎬 Video</option>
                                    </select>
                                    <input type="url" class="media-url" placeholder="URL media" required>
                                    <input type="text" class="media-caption" placeholder="Caption">
                                    <button type="button" class="btn-remove" onclick="removeMediaItem(this)">✕</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn-secondary" onclick="addMediaItem()">➕ Tambah Media</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">💾 Simpan Post</button>
                        <button type="button" class="btn-secondary" onclick="resetForm()">🔄 Reset</button>
                    </div>
                </form>

                <div id="formResult" class="form-result hidden"></div>
            </section>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal hidden">
        <div class="modal-content">
            <h3>🗑️ Hapus Post?</h3>
            <p>Yakin ingin menghapus post ini? Tindakan ini tidak bisa dibatalkan.</p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeDeleteModal()">Batal</button>
                <button class="btn-danger" id="confirmDeleteBtn">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toastMessage"></span>
    </div>

    <!-- Scripts - Urutan penting! -->
    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
