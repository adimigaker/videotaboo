<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VideoTabu — Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="topbar">
    <div class="logo">VIDEO<span class="accent">TABU</span></div>
    <span class="badge">DASHBOARD</span>
    <div class="spacer"></div>
    <a href="../index.html" class="link-view">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Lihat Situs
    </a>
</div>

<div class="container">

    <div class="filter-stack">
        <input type="text" id="searchInput" class="input" placeholder="Cari judul...">
        <select id="genreFilter" class="input">
            <option value="">Semua Genre</option>
        </select>
        <select id="statusFilter" class="input">
            <option value="">Semua Status</option>
            <option value="published">Published</option>
            <option value="draft">Draft</option>
        </select>
    </div>

    <div class="btn-row">
        <button class="btn btn-primary" id="newPostBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Tambah Postingan
        </button>
        <button class="btn btn-secondary" id="syncBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total Post</div></div>
        <div class="stat-card"><div class="num" id="statPublished">0</div><div class="label">Published</div></div>
        <div class="stat-card"><div class="num" id="statDraft">0</div><div class="label">Draft</div></div>
    </div>

    <div class="post-list" id="postList"></div>

</div>

<!-- Modal Tambah Postingan -->
<div class="modal-overlay" id="newPostModal">
    <div class="modal-box">
        <h3>Postingan Baru</h3>
        <form id="newPostForm">
            <label>Judul *</label>
            <input type="text" class="input" id="popupTitle" placeholder="Judul postingan" required>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="closeModalBtn" style="flex:1;">Batal</button>
                <button type="submit" class="btn btn-primary" style="flex:2;">Lanjut ke Editor</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal-overlay" id="confirmDeleteOverlay">
    <div class="modal-box">
        <h3>Hapus postingan?</h3>
        <p style="color:var(--text-light);font-size:14px;margin-bottom:6px;">Tindakan ini tidak bisa dibatalkan.</p>
        <p id="deletePostName" style="font-size:14px;font-weight:600;"></p>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="cancelDeleteBtn" style="flex:1;">Batal</button>
            <button class="btn btn-primary" id="confirmDeleteBtn" style="flex:1;background:var(--accent);">Hapus</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
