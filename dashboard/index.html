<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dashboard - VideoTabu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dash-header">
        <div class="dash-header-inner">
            <h1>🎬 VideoTabu</h1>
            <div class="header-actions">
                <button id="newPostBtn" class="btn-primary">➕ Post Baru</button>
                <button id="syncBtn" class="btn-secondary">🔄 Sync</button>
            </div>
        </div>
    </header>

    <main id="postsContainer" class="list-view">
        <!-- Render by JS -->
    </main>

    <!-- Modal Create/Edit Post -->
    <div id="postModal" class="modal-overlay" style="display:none;">
        <div class="modal-popup modal-lg">
            <button class="modal-close" id="closeModalBtn">✕</button>
            <h2 id="modalTitle">Post Baru</h2>
            <form id="postForm">
                <div class="form-group">
                    <label>Judul *</label>
                    <input type="text" id="postTitle" required placeholder="Masukkan judul">
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="postGenre" placeholder="Travel, Food, Photography">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="postStatus">
                        <option value="draft">📄 Draft</option>
                        <option value="published">✅ Published</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cover URL</label>
                    <div class="thumb-upload-wrap">
                        <input type="text" id="postCover" placeholder="https://...">
                        <button type="button" id="uploadCoverBtn" class="btn-secondary">📤 Upload</button>
                    </div>
                    <div id="coverPreview" style="display:none;margin-top:8px;">
                        <img id="coverPreviewImg" style="max-width:100%;max-height:120px;border-radius:6px;">
                        <button id="removeCoverBtn" class="btn-remove-sm">✕</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Konten Media (JSON)</label>
                    <textarea id="postContent" rows="6" placeholder='[{"img":"https://...","cap":"Caption"},{"vid":"https://...","cap":"Caption"}]'></textarea>
                    <small>Format: [{"img":"url","cap":"caption"}, {"vid":"url","cap":"caption"}]</small>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">💾 Simpan</button>
                    <button type="button" class="btn-secondary" id="cancelModalBtn">Batal</button>
                </div>
            </form>
            <div id="formResult" style="display:none;"></div>
        </div>
    </div>

    <!-- Modal Delete -->
    <div id="deleteModal" class="modal-overlay" style="display:none;">
        <div class="modal-popup modal-sm">
            <h3>🗑️ Hapus Post?</h3>
            <p>Yakin ingin menghapus <strong id="deletePostName"></strong>?</p>
            <div class="confirm-actions">
                <button class="btn-secondary" id="cancelDeleteBtn">Batal</button>
                <button class="btn-danger" id="confirmDeleteBtn">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
    <!-- Di bagian bawah body -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
