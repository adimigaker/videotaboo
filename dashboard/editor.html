<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VideoTabu — Editor</title>
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<div class="topbar">
    <div class="logo">VIDEO<span class="accent">TABU</span></div>
    <span class="badge">EDITOR</span>
    <div class="spacer"></div>
    <a href="index.html" class="link-view">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Kembali
    </a>
</div>

<div class="container">

    <!-- INFORMASI DASAR -->
    <div class="editor-section">
        <h4>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Informasi Dasar
        </h4>
        <div class="field">
            <label>Judul *</label>
            <input type="text" id="fieldTitle" class="input" placeholder="Judul postingan">
        </div>
        <div class="field">
            <label>Genre (pisahkan dengan koma)</label>
            <input type="text" id="fieldGenre" class="input" placeholder="indo, sma, drama">
        </div>
        <div class="field switch-row">
            <span class="status-label" id="statusLabel">Draft</span>
            <label class="switch">
                <input type="checkbox" id="fieldStatus">
                <span class="switch-track"></span>
            </label>
        </div>
    </div>

    <!-- COVER -->
    <div class="editor-section">
        <h4>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Cover
        </h4>
        <div class="field">
            <label>Cover URL</label>
            <div class="field-row">
                <input type="text" id="fieldCover" class="input" placeholder="https://...">
                <button class="btn-icon" id="uploadCoverBtn" title="Upload">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
            </div>
            <div class="hint">Kosongkan untuk pakai gambar pertama dari Content Blocks</div>
            <img id="coverPreview" class="preview-img" style="display:none;">
        </div>
    </div>

    <!-- CONTENT BLOCKS -->
    <div class="editor-section">
        <h4>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Content Blocks
        </h4>
        <div id="blockList"></div>
        <button class="add-block-btn" id="addBlockBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Tambah Block
        </button>
    </div>

    <div class="editor-footer">
        <button class="btn btn-secondary" id="cancelBtn" style="flex:1;">Batal</button>
        <button class="btn btn-primary" id="saveBtn" style="flex:2;">Simpan</button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
